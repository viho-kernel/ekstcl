apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8-roboshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8-roboshop
  template:
    metadata:
      labels:
        app: k8-roboshop
    spec:
      containers:
        - name: k8-roboshop
          image: viharireddy18/projector-app
---
apiVersion: v1
kind: Service
metadata:
  name: my-nginx-service
  labels:
    app: k8-roboshop
spec:
  type: LoadBalancer
  selector:
      app: k8-roboshop
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 5000
      nodePort: 30609